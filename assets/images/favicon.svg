<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Tyrant Crown stamp — vector favicon -->
  <defs>
    <linearGradient id="iron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f232a"/>
      <stop offset="1" stop-color="#0d1015"/>
    </linearGradient>
  </defs>
  <!-- Spikes + crown body as a single path -->
  <path d="M 6 36
           L 12 18
           L 16 30
           L 22 8
           L 26 30
           L 32 4
           L 38 30
           L 42 8
           L 48 30
           L 52 18
           L 58 36
           L 56 48
           L 8 48
           Z"
        fill="url(#iron)" stroke="none"/>
  <!-- Lower band -->
  <ellipse cx="32" cy="51" rx="26" ry="6" fill="#0d1015"/>
  <!-- Center gem (hexagonal) -->
  <path d="M 28 36
           L 32 33
           L 36 36
           L 36 44
           L 32 47
           L 28 44
           Z"
        fill="#a4192e"/>
  <!-- Gem highlight -->
  <path d="M 30 36 L 32 34.5 L 33 36 L 32 38 Z" fill="#e84561" opacity="0.7"/>
</svg>
